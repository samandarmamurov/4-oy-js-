<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="./css/style-plus.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">

    <!-- LEFT PANEL -->
    <div class="left">
  <header class="header">
    <div class="logo">
      <img src="./img/top-.svg" alt="Al Muamalat Logo">
    </div>
    <div class="ask-diyor">
      <span>Questions?</span>
      <h2>Ask Diyor</h2>
    </div>
  </header>

  <main class="main">
    <h1 class="tagline">Get started</h1>

    <p>
      Already have an account?
      <a href="login.html">Sign in</a>
    </p>

    <div class="input-group">
      <input type="text" placeholder="Enter your name" required>
    </div>

    <div class="input-group">
      <input type="email" placeholder="Enter your email" required>
    </div>

    <div class="input-group select">
      <img src="./img/flag.svg">
      <select>
        <option>Uzbekistan</option>
        <option>Kazakhstan</option>
        <option>USA</option>
        <option>Africa</option>
        <option>America</option>
        <option>Asia</option>
        <option>Europe</option>
        <option>Oceania</option>
      </select>
    </div>

    <button type="submit" class="sign-in-btn">
      Log in
    </button>
  </main>
</div>

    <!-- AVATAR CHEGARADA -->
    <div class="avatar-border">
      <img src="./img/dffjb.svg" alt="Diyor">
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
      <div class="illustration">
        <img src="./img/img.png" alt="">
      </div>
      <div class="right-text">
        <h2>Welcome to Al Muamalat –<br>Empowering Your Journey<br>in Islamic Finance</h2>
      </div>
    </div>

  </div>
<script src="./app.js"></script>
</body>
</html>
